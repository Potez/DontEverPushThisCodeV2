name: DevSecOps Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write   # TODO#0a: upload SARIF
  issues: write            # TODO#0b: comment on issues
  pull-requests: write     # TODO#0b: comment on PRs
  id-token: write          # TODO#0c: OIDC token
  actions: read

jobs:
    secret-scanning:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0  # TODO#1: ดึง history ทั้งหมดเพื่อ diff ทุก commit

            - name: Run TruffleHog
              uses: trufflesecurity/trufflehog@main
              continue-on-error: true
              with:
                path: ./
                base: ${{ github.event.repository.default_branch }}  # TODO#2: base branch
                head: HEAD                                            # TODO#2: HEAD ref
                extra_args: --only-verified                          # TODO#3: report เฉพาะ verified secrets

            # TODO#4: Gitleaks
            - name: Run Gitleaks
              uses: gitleaks/gitleaks-action@v2
              continue-on-error: true
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
                GITLEAKS_ENABLE_SUMMARY: true

    sast-scan:
        runs-on: ubuntu-latest
        needs: secret-scanning
        if: ${{ !cancelled() }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0  # TODO#5: Sonar ต้องการ full history

            # TODO#6: SonarQube
            - name: SonarQube Scan
              uses: SonarSource/sonarqube-scan-action@v7.1.0
              continue-on-error: true
              env:
                SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    codeql-scan:
        runs-on: ubuntu-latest
        needs: secret-scanning
        if: ${{ !cancelled() }}
        strategy:
            matrix:
                language: [ 'javascript' ]  # TODO#7: Next.js/React ใช้ JavaScript
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Initialize CodeQL
              uses: github/codeql-action/init@v3
              with:
                languages: ${{ matrix.language }}
                queries: security-extended,security-and-quality  # TODO#8

            # TODO#9: Analyze
            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@v3
              with:
                category: "/language:${{ matrix.language }}"

    dependency-scanning:
        runs-on: ubuntu-latest
        needs: [sast-scan, secret-scanning]
        if: ${{ !cancelled() }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            # TODO#10: Setup Node 20
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                node-version: '20'

            # TODO#11: Install dependencies
            - name: Install dependencies
              run: npm ci

            - name: Depcheck
              uses: dependency-check/Dependency-Check_Action@main
              continue-on-error: true
              id: Depcheck
              with:
                project: 'DontEverPushThisCodeV2'
                path: '.'
                format: 'SARIF'   # TODO#12: SARIF สำหรับ Security tab
                out: 'reports'
                args: >
                    --failOnCVSS 7    
                    --enableRetired

            # TODO#14: Upload SARIF
            - name: Upload Depcheck SARIF to Security tab
              if: always()
              uses: github/codeql-action/upload-sarif@v3
              continue-on-error: true
              with:
                sarif_file: reports/dependency-check-report.sarif
                category: dependency-check

            # TODO#15: Upload artifact
            - name: Upload Depcheck HTML report as artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: depcheck-report
                path: reports/

    image-scanning:
        runs-on: ubuntu-latest
        needs: [dependency-scanning]
        if: ${{ !cancelled() }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            # TODO#16: Build Docker image
            - name: Build Docker image
              run: docker build -t my-app:latest .

            - name: Trivy Scan
              uses: aquasecurity/trivy-action@master
              continue-on-error: true
              with:
                image-ref: 'my-app:latest'
                format: 'sarif'         # TODO#17
                output: 'trivy-results.sarif'
                severity: 'HIGH,CRITICAL'  # TODO#18: เน้น HIGH และ CRITICAL
                ignore-unfixed: true       # TODO#19: ข้าม CVE ที่ยังไม่มี fix

            # TODO#20: Upload Trivy SARIF
            - name: Upload Trivy SARIF to Security tab
              if: always()
              uses: github/codeql-action/upload-sarif@v3
              with:
                sarif_file: trivy-results.sarif
                category: trivy

            # TODO#21: Upload Trivy artifact
            - name: Upload Trivy SARIF as artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: trivy-report
                path: trivy-results.sarif